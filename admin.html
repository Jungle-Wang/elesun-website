<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elesun 后台管理</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-card: #141414;
            --bg-input: #1a1a1a;
            --border: #333;
            --border-focus: #07C160;
            --green: #07C160;
            --green-glow: rgba(7,193,96,0.2);
            --text: #fff;
            --text-dim: #888;
            --text-muted: #555;
            --danger: #e74c3c;
            --danger-bg: rgba(231,76,60,0.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'DM Sans',sans-serif;
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
        }

        /* Login Screen */
        .login-screen {
            display:flex; align-items:center; justify-content:center;
            min-height:100vh; padding:2rem;
        }
        .login-box {
            background:var(--bg-card); border:1px solid var(--border);
            padding:3rem; border-radius:12px; max-width:380px; width:100%; text-align:center;
        }
        .login-box h1 {
            font-family:'Bebas Neue',sans-serif; font-size:2rem; margin-bottom:0.5rem;
            background:linear-gradient(135deg,#fff,var(--green));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .login-box p { color:var(--text-dim); font-size:0.85rem; margin-bottom:2rem; }
        .login-box input {
            width:100%; padding:0.75rem 1rem; background:var(--bg-input); border:1px solid var(--border);
            border-radius:8px; color:#fff; font-size:1rem; outline:none; margin-bottom:1rem;
        }
        .login-box input:focus { border-color:var(--border-focus); }
        .login-box button {
            width:100%; padding:0.75rem; background:var(--green); color:#000; border:none;
            border-radius:8px; font-weight:700; font-size:1rem; cursor:pointer;
            transition:all 0.3s;
        }
        .login-box button:hover { background:#fff; }
        .login-error { color:var(--danger); font-size:0.85rem; margin-top:0.5rem; display:none; }

        /* Dashboard */
        .dashboard { display:none; }
        .dashboard.active { display:block; }

        /* Top Bar */
        .topbar {
            position:sticky; top:0; z-index:100;
            display:flex; align-items:center; justify-content:space-between;
            padding:1rem 2rem; background:var(--bg-card); border-bottom:1px solid var(--border);
        }
        .topbar-brand {
            font-family:'Bebas Neue',sans-serif; font-size:1.4rem;
            display:flex; align-items:center; gap:0.5rem;
        }
        .topbar-brand svg { width:24px; height:28px; }
        .topbar-actions { display:flex; gap:0.75rem; align-items:center; }

        /* Buttons */
        .btn {
            padding:0.5rem 1.25rem; border-radius:6px; font-size:0.85rem; font-weight:600;
            cursor:pointer; border:none; transition:all 0.2s; display:inline-flex;
            align-items:center; gap:0.4rem;
        }
        .btn-green { background:var(--green); color:#000; }
        .btn-green:hover { background:#fff; }
        .btn-outline { background:transparent; color:var(--text-dim); border:1px solid var(--border); }
        .btn-outline:hover { border-color:var(--green); color:var(--green); }
        .btn-danger { background:var(--danger-bg); color:var(--danger); border:1px solid rgba(231,76,60,0.3); }
        .btn-danger:hover { background:var(--danger); color:#fff; }
        .btn-sm { padding:0.35rem 0.8rem; font-size:0.78rem; }

        /* Tabs */
        .tabs {
            display:flex; gap:0; border-bottom:1px solid var(--border);
            background:var(--bg-card); padding:0 2rem; overflow-x:auto;
        }
        .tab {
            padding:0.9rem 1.5rem; cursor:pointer; font-size:0.85rem; font-weight:500;
            color:var(--text-dim); border-bottom:2px solid transparent;
            transition:all 0.2s; white-space:nowrap;
        }
        .tab:hover { color:var(--text); }
        .tab.active { color:var(--green); border-bottom-color:var(--green); }

        /* Content Area */
        .content { padding:2rem; max-width:960px; margin:0 auto; }
        .tab-panel { display:none; }
        .tab-panel.active { display:block; }

        /* Form Groups */
        .form-section {
            background:var(--bg-card); border:1px solid var(--border);
            border-radius:10px; padding:1.5rem; margin-bottom:1.5rem;
        }
        .form-section h3 {
            font-family:'Bebas Neue',sans-serif; font-size:1.2rem;
            margin-bottom:1rem; color:var(--green); letter-spacing:0.05em;
        }
        .form-row {
            display:grid; grid-template-columns:1fr 1fr; gap:1rem;
            margin-bottom:1rem;
        }
        .form-row.single { grid-template-columns:1fr; }
        .form-group { display:flex; flex-direction:column; gap:0.35rem; }
        .form-group label { font-size:0.78rem; color:var(--text-dim); font-weight:500; }
        .form-group input, .form-group textarea, .form-group select {
            padding:0.65rem 0.8rem; background:var(--bg-input); border:1px solid var(--border);
            border-radius:6px; color:#fff; font-size:0.9rem; outline:none;
            font-family:'DM Sans',sans-serif; resize:vertical;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color:var(--border-focus);
        }
        .form-group textarea { min-height:80px; }
        .form-hint { font-size:0.72rem; color:var(--text-muted); }

        /* Vehicle Cards */
        .vehicle-list { display:flex; flex-direction:column; gap:1rem; }
        .vehicle-card {
            background:var(--bg-card); border:1px solid var(--border);
            border-radius:10px; overflow:hidden; transition:all 0.2s;
        }
        .vehicle-card:hover { border-color:var(--green); }
        .vehicle-header {
            display:flex; align-items:center; justify-content:space-between;
            padding:1rem 1.5rem; cursor:pointer;
        }
        .vehicle-header-left { display:flex; align-items:center; gap:1rem; }
        .vehicle-model-badge {
            background:var(--green); color:#000; width:40px; height:40px;
            border-radius:8px; display:flex; align-items:center; justify-content:center;
            font-family:'Bebas Neue',sans-serif; font-size:1.3rem; font-weight:700;
        }
        .vehicle-series { font-weight:600; }
        .vehicle-tag { font-size:0.75rem; color:var(--green); }
        .vehicle-body { padding:0 1.5rem 1.5rem; display:none; }
        .vehicle-card.expanded .vehicle-body { display:block; }
        .vehicle-actions { display:flex; gap:0.5rem; }
        .expand-arrow {
            transition:transform 0.2s; color:var(--text-dim); font-size:1.2rem;
        }
        .vehicle-card.expanded .expand-arrow { transform:rotate(180deg); }

        /* Image Preview */
        .img-preview {
            width:100%; max-height:200px; object-fit:cover; border-radius:6px;
            border:1px solid var(--border); margin-top:0.5rem; display:none;
        }
        .img-preview.visible { display:block; }

        /* Values List */
        .values-list { display:flex; flex-direction:column; gap:0.5rem; }
        .value-row {
            display:flex; align-items:center; gap:1rem; padding:0.75rem 1rem;
            background:var(--bg-input); border-radius:6px;
        }
        .value-num {
            color:var(--green); font-family:'Bebas Neue',sans-serif; font-size:1.1rem;
            min-width:30px;
        }
        .value-row input {
            flex:1; padding:0.4rem 0.6rem; background:var(--bg); border:1px solid var(--border);
            border-radius:4px; color:#fff; font-size:0.85rem; outline:none;
        }
        .value-row input:focus { border-color:var(--border-focus); }

        /* Toast */
        .toast {
            position:fixed; bottom:2rem; right:2rem; z-index:9999;
            padding:0.75rem 1.5rem; border-radius:8px; font-size:0.85rem;
            font-weight:600; transform:translateY(100px); opacity:0;
            transition:all 0.3s;
        }
        .toast.show { transform:translateY(0); opacity:1; }
        .toast.success { background:var(--green); color:#000; }
        .toast.error { background:var(--danger); color:#fff; }

        /* Confirm Modal */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:9998;
            display:none; align-items:center; justify-content:center;
        }
        .modal-overlay.active { display:flex; }
        .modal-box {
            background:var(--bg-card); border:1px solid var(--border);
            border-radius:10px; padding:2rem; max-width:400px; width:90%; text-align:center;
        }
        .modal-box h3 { margin-bottom:0.5rem; font-size:1.1rem; }
        .modal-box p { color:var(--text-dim); font-size:0.9rem; margin-bottom:1.5rem; }
        .modal-actions { display:flex; gap:0.75rem; justify-content:center; }

        @media(max-width:600px) {
            .form-row { grid-template-columns:1fr; }
            .content { padding:1rem; }
            .topbar { padding:0.75rem 1rem; }
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <svg viewBox="0 0 40 48" fill="none" width="48" style="margin-bottom:1rem"><path d="M24 0L6 26h12L14 48l20-30H22L30 0h-6z" fill="#07C160"/></svg>
        <h1>ELESUN ADMIN</h1>
        <p>后台管理系统</p>
        <input type="password" id="loginPwd" placeholder="输入管理密码" onkeydown="if(event.key==='Enter')doLogin()">
        <button onclick="doLogin()">登 录</button>
        <div class="login-error" id="loginError">密码错误</div>
    </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
    <div class="topbar">
        <div class="topbar-brand">
            <svg viewBox="0 0 40 48" fill="none"><path d="M24 0L6 26h12L14 48l20-30H22L30 0h-6z" fill="#07C160"/></svg>
            ELESUN ADMIN
        </div>
        <div class="topbar-actions">
            <button class="btn btn-green" onclick="saveData()">💾 保存数据</button>
            <button class="btn btn-outline" onclick="deploySite()">🚀 一键发布</button>
            <button class="btn btn-outline" onclick="previewSite()">👁 预览</button>
            <button class="btn btn-outline" onclick="doLogout()">退出</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="hero" onclick="switchTab('hero')">首页 Hero</div>
        <div class="tab" data-tab="vehicles" onclick="switchTab('vehicles')">🛵 车型管理</div>
        <div class="tab" data-tab="mission" onclick="switchTab('mission')">🎯 品牌使命</div>
        <div class="tab" data-tab="values" onclick="switchTab('values')">💎 核心价值</div>
        <div class="tab" data-tab="contact" onclick="switchTab('contact')">📞 联系方式</div>
        <div class="tab" data-tab="footer" onclick="switchTab('footer')">📋 页脚信息</div>
    </div>

    <div class="content">
        <!-- Hero Tab -->
        <div class="tab-panel active" id="panel-hero">
            <div class="form-section">
                <h3>HERO 区域</h3>
                <div class="form-row single">
                    <div class="form-group">
                        <label>主标语 (支持 &lt;br&gt; 换行)</label>
                        <input type="text" id="hero-slogan" placeholder="POWER THE WORLD<br>GREEN THE FUTURE">
                    </div>
                </div>
                <div class="form-row single">
                    <div class="form-group">
                        <label>副标题</label>
                        <textarea id="hero-subtitle" rows="3"></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>按钮文字</label>
                        <input type="text" id="hero-ctaText" placeholder="Get in Touch">
                    </div>
                    <div class="form-group">
                        <label>按钮链接</label>
                        <input type="text" id="hero-ctaLink" placeholder="https://wa.me/...">
                    </div>
                </div>
            </div>
        </div>

        <!-- Vehicles Tab -->
        <div class="tab-panel" id="panel-vehicles">
            <div class="form-section">
                <h3>车型列表</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>区域标题</label>
                        <input type="text" id="vehicles-title" placeholder="ELECTRIC VEHICLES">
                    </div>
                    <div class="form-group">
                        <label>区域描述</label>
                        <input type="text" id="vehicles-desc">
                    </div>
                </div>
            </div>
            <div class="vehicle-list" id="vehicleList"></div>
            <button class="btn btn-outline" style="margin-top:1rem" onclick="addVehicle()">+ 添加车型</button>
        </div>

        <!-- Mission Tab -->
        <div class="tab-panel" id="panel-mission">
            <div class="form-section">
                <h3>品牌使命</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>标签</label>
                        <input type="text" id="mission-label">
                    </div>
                    <div class="form-group">
                        <label>标题 (支持 &lt;br&gt;)</label>
                        <input type="text" id="mission-title">
                    </div>
                </div>
                <div class="form-row single">
                    <div class="form-group">
                        <label>描述</label>
                        <textarea id="mission-desc" rows="2"></textarea>
                    </div>
                </div>
            </div>
            <div class="form-section">
                <h3>使命卡片</h3>
                <div id="missionCards"></div>
                <button class="btn btn-outline" style="margin-top:1rem" onclick="addMissionCard()">+ 添加卡片</button>
            </div>
        </div>

        <!-- Values Tab -->
        <div class="tab-panel" id="panel-values">
            <div class="form-section">
                <h3>核心价值观</h3>
                <div class="form-row single">
                    <div class="form-group">
                        <label>区域描述</label>
                        <input type="text" id="values-desc">
                    </div>
                </div>
                <div class="values-list" id="valuesList"></div>
                <button class="btn btn-outline" style="margin-top:1rem" onclick="addValue()">+ 添加价值</button>
            </div>
        </div>

        <!-- Contact Tab -->
        <div class="tab-panel" id="panel-contact">
            <div class="form-section">
                <h3>联系方式</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>WhatsApp 号码 (显示)</label>
                        <input type="text" id="contact-whatsapp" placeholder="+62 813-8899-1356">
                    </div>
                    <div class="form-group">
                        <label>WhatsApp 链接</label>
                        <input type="text" id="contact-whatsappLink" placeholder="https://wa.me/6281388991356">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="text" id="contact-email" placeholder="info@elesun.vip">
                    </div>
                    <div class="form-group">
                        <label>WhatsApp 按钮文字</label>
                        <input type="text" id="contact-ctaWhatsapp">
                    </div>
                </div>
                <div class="form-row single">
                    <div class="form-group">
                        <label>CTA 标题 (支持 &lt;span&gt;)</label>
                        <input type="text" id="contact-title">
                    </div>
                </div>
                <div class="form-row single">
                    <div class="form-group">
                        <label>CTA 描述</label>
                        <textarea id="contact-desc" rows="2"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer Tab -->
        <div class="tab-panel" id="panel-footer">
            <div class="form-section">
                <h3>页脚信息</h3>
                <div class="form-row single">
                    <div class="form-group">
                        <label>品牌描述</label>
                        <textarea id="footer-brandDesc" rows="2"></textarea>
                    </div>
                </div>
                <div class="form-row single">
                    <div class="form-group">
                        <label>版权信息</label>
                        <input type="text" id="footer-copyright">
                    </div>
                </div>
                <div class="form-row single">
                    <div class="form-group">
                        <label>产品系列 (逗号分隔)</label>
                        <input type="text" id="footer-products" placeholder="Luminapaws,NebulaStride,Terramorph,MagnusMax">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal-box">
        <h3 id="confirmTitle">确认</h3>
        <p id="confirmMsg">确定要执行此操作吗？</p>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeConfirm()">取消</button>
            <button class="btn btn-danger" id="confirmBtn" onclick="confirmAction()">确认</button>
        </div>
    </div>
</div>

<script>
// ===== CONFIG =====
const ADMIN_PWD = 'elesun2026';
const DATA_FILE = 'data.json';
let siteData = null;
let pendingConfirm = null;

// ===== LOGIN =====
function doLogin() {
    const pwd = document.getElementById('loginPwd').value;
    if (pwd === ADMIN_PWD) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').classList.add('active');
        loadData();
    } else {
        const err = document.getElementById('loginError');
        err.style.display = 'block';
        setTimeout(() => err.style.display = 'none', 2000);
    }
}
function doLogout() {
    document.getElementById('dashboard').classList.remove('active');
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loginPwd').value = '';
}

// ===== TABS =====
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
    document.getElementById(`panel-${tab}`).classList.add('active');
}

// ===== DATA LOAD =====
async function loadData() {
    try {
        const res = await fetch(DATA_FILE + '?t=' + Date.now());
        siteData = await res.json();
        populateForm();
        toast('数据加载成功', 'success');
    } catch(e) {
        toast('数据加载失败: ' + e.message, 'error');
    }
}

function populateForm() {
    // Hero
    val('hero-slogan', siteData.hero.slogan);
    val('hero-subtitle', siteData.hero.subtitle);
    val('hero-ctaText', siteData.hero.ctaText);
    val('hero-ctaLink', siteData.hero.ctaLink);

    // Vehicles
    val('vehicles-title', siteData.vehicles.title);
    val('vehicles-desc', siteData.vehicles.desc);
    renderVehicles();

    // Mission
    val('mission-label', siteData.mission.label);
    val('mission-title', siteData.mission.title);
    val('mission-desc', siteData.mission.desc);
    renderMissionCards();

    // Values
    val('values-desc', siteData.values.desc);
    renderValues();

    // Contact
    val('contact-whatsapp', siteData.contact.whatsapp);
    val('contact-whatsappLink', siteData.contact.whatsappLink);
    val('contact-email', siteData.contact.email);
    val('contact-ctaWhatsapp', siteData.contact.ctaWhatsapp);
    val('contact-title', siteData.contact.title);
    val('contact-desc', siteData.contact.desc);

    // Footer
    val('footer-brandDesc', siteData.footer.brandDesc);
    val('footer-copyright', siteData.site.copyright);
    val('footer-products', siteData.footer.products.join(','));
}

function val(id, v) { document.getElementById(id).value = v || ''; }

// ===== VEHICLES =====
function renderVehicles() {
    const list = document.getElementById('vehicleList');
    list.innerHTML = siteData.vehicles.models.map((v, i) => `
        <div class="vehicle-card" id="vc-${i}">
            <div class="vehicle-header" onclick="toggleVehicle(${i})">
                <div class="vehicle-header-left">
                    <div class="vehicle-model-badge">${v.model}</div>
                    <div>
                        <div class="vehicle-series">${v.series}</div>
                        <div class="vehicle-tag">${v.tag}</div>
                    </div>
                </div>
                <div class="vehicle-actions">
                    <span class="expand-arrow">▼</span>
                    <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();removeVehicle(${i})">删除</button>
                </div>
            </div>
            <div class="vehicle-body">
                <div class="form-row">
                    <div class="form-group">
                        <label>车型代号</label>
                        <input type="text" value="${v.model}" onchange="siteData.vehicles.models[${i}].model=this.value">
                    </div>
                    <div class="form-group">
                        <label>系列名称</label>
                        <input type="text" value="${v.series}" onchange="siteData.vehicles.models[${i}].series=this.value">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>标签</label>
                        <input type="text" value="${v.tag}" onchange="siteData.vehicles.models[${i}].tag=this.value">
                    </div>
                    <div class="form-group">
                        <label>图片URL</label>
                        <input type="text" value="${v.image||''}" placeholder="留空则显示型号" onchange="siteData.vehicles.models[${i}].image=this.value;previewImg(this)">
                        <img class="img-preview" src="${v.image||''}" onerror="this.classList.remove('visible')" onload="this.classList.add('visible')" style="${v.image?'display:block':'display:none'}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>续航 (km)</label>
                        <input type="text" value="${v.specs.range||''}" placeholder="如: 80" onchange="siteData.vehicles.models[${i}].specs.range=this.value">
                    </div>
                    <div class="form-group">
                        <label>最高速度 (km/h)</label>
                        <input type="text" value="${v.specs.speed||''}" placeholder="如: 60" onchange="siteData.vehicles.models[${i}].specs.speed=this.value">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>电池容量</label>
                        <input type="text" value="${v.specs.battery||''}" placeholder="如: 60V20Ah" onchange="siteData.vehicles.models[${i}].specs.battery=this.value">
                    </div>
                    <div class="form-group">
                        <label>整备重量 (kg)</label>
                        <input type="text" value="${v.specs.weight||''}" placeholder="如: 85" onchange="siteData.vehicles.models[${i}].specs.weight=this.value">
                    </div>
                </div>
            </div>
        </div>
    `).join('');
}

function toggleVehicle(i) {
    document.getElementById('vc-'+i).classList.toggle('expanded');
}

function addVehicle() {
    siteData.vehicles.models.push({
        id: 'new' + Date.now(),
        model: 'NEW',
        series: 'SERIES NAME',
        tag: 'Tag · Tag',
        image: '',
        specs: { range:'', speed:'', battery:'', weight:'' }
    });
    renderVehicles();
}

function removeVehicle(i) {
    showConfirm('删除车型', `确定删除 ${siteData.vehicles.models[i].series}?`, () => {
        siteData.vehicles.models.splice(i, 1);
        renderVehicles();
        toast('已删除', 'success');
    });
}

// ===== MISSION CARDS =====
function renderMissionCards() {
    const el = document.getElementById('missionCards');
    el.innerHTML = siteData.mission.cards.map((c, i) => `
        <div class="form-section" style="margin-bottom:1rem">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
                <span style="color:var(--green);font-family:'Bebas Neue';font-size:1rem">CARD ${i+1}</span>
                <button class="btn btn-danger btn-sm" onclick="removeMissionCard(${i})">删除</button>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" value="${c.title}" onchange="siteData.mission.cards[${i}].title=this.value">
                </div>
                <div class="form-group">
                    <label>图标</label>
                    <select onchange="siteData.mission.cards[${i}].icon=this.value">
                        <option value="globe" ${c.icon==='globe'?'selected':''}>🌐 地球</option>
                        <option value="shield" ${c.icon==='shield'?'selected':''}>🛡 盾牌</option>
                        <option value="star" ${c.icon==='star'?'selected':''}>⭐ 星星</option>
                        <option value="zap" ${c.icon==='zap'?'selected':''}>⚡ 闪电</option>
                        <option value="heart" ${c.icon==='heart'?'selected':''}>❤️ 心</option>
                    </select>
                </div>
            </div>
            <div class="form-row single">
                <div class="form-group">
                    <label>描述</label>
                    <textarea rows="2" onchange="siteData.mission.cards[${i}].desc=this.value">${c.desc}</textarea>
                </div>
            </div>
        </div>
    `).join('');
}

function addMissionCard() {
    siteData.mission.cards.push({ title:'NEW CARD', desc:'Description here', icon:'globe' });
    renderMissionCards();
}

function removeMissionCard(i) {
    siteData.mission.cards.splice(i, 1);
    renderMissionCards();
}

// ===== VALUES =====
function renderValues() {
    const el = document.getElementById('valuesList');
    el.innerHTML = siteData.values.items.map((v, i) => `
        <div class="value-row">
            <span class="value-num">0${i+1}</span>
            <input type="text" value="${v.zh}" placeholder="中文" onchange="siteData.values.items[${i}].zh=this.value">
            <input type="text" value="${v.en}" placeholder="English" onchange="siteData.values.items[${i}].en=this.value">
            <button class="btn btn-danger btn-sm" onclick="removeValue(${i})">✕</button>
        </div>
    `).join('');
}

function addValue() {
    siteData.values.items.push({ zh:'新价值', en:'New Value' });
    renderValues();
}

function removeValue(i) {
    siteData.values.items.splice(i, 1);
    renderValues();
}

// ===== COLLECT DATA =====
function collectForm() {
    siteData.hero.slogan = val('hero-slogan');
    siteData.hero.subtitle = val('hero-subtitle');
    siteData.hero.ctaText = val('hero-ctaText');
    siteData.hero.ctaLink = val('hero-ctaLink');

    siteData.vehicles.title = val('vehicles-title');
    siteData.vehicles.desc = val('vehicles-desc');

    siteData.mission.label = val('mission-label');
    siteData.mission.title = val('mission-title');
    siteData.mission.desc = val('mission-desc');

    siteData.values.desc = val('values-desc');

    siteData.contact.whatsapp = val('contact-whatsapp');
    siteData.contact.whatsappLink = val('contact-whatsappLink');
    siteData.contact.email = val('contact-email');
    siteData.contact.ctaWhatsapp = val('contact-ctaWhatsapp');
    siteData.contact.title = val('contact-title');
    siteData.contact.desc = val('contact-desc');

    siteData.footer.brandDesc = val('footer-brandDesc');
    siteData.site.copyright = val('footer-copyright');
    siteData.footer.products = val('footer-products').split(',').map(s=>s.trim()).filter(Boolean);

    return siteData;
}

function val(id) { return document.getElementById(id).value; }

// ===== SAVE =====
async function saveData() {
    collectForm();
    try {
        const blob = new Blob([JSON.stringify(siteData, null, 2)], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'data.json';
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(url);
        toast('✅ data.json 已下载！请替换到 elesun-website 目录后点一键发布', 'success');
    } catch(e) {
        toast('保存失败: ' + e.message, 'error');
    }
}

// ===== PREVIEW =====
function previewSite() {
    window.open('index.html', '_blank');
}

// ===== DEPLOY =====
function deploySite() {
    if (!confirm('确认发布？\n\n发布前请确保：\n1. 已点击「保存数据」下载 data.json\n2. 已将 data.json 替换到项目目录\n\n点击确定将推送当前线上版本到 GitHub Pages。')) return;
    // Since admin.html runs in browser, we can't directly git push.
    // Instead, copy data.json to clipboard for easy paste
    collectForm();
    const json = JSON.stringify(siteData, null, 2);
    navigator.clipboard.writeText(json).then(() => {
        toast('📋 JSON 已复制到剪贴板！\n\n请在终端执行以下命令发布：\n\ncd ~/.qclaw/workspace/elesun-website\necho \'<粘贴JSON>\' > data.json\ngit add . && git commit -m "update content" && git push', 'success');
    }).catch(() => {
        toast('请手动复制 data.json 内容，或让 QClaw 帮你发布', 'success');
    });
}

// ===== HELPERS =====
function toast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    setTimeout(() => t.classList.add('show'), 10);
    setTimeout(() => t.classList.remove('show'), 3000);
}

function showConfirm(title, msg, cb) {
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMsg').textContent = msg;
    pendingConfirm = cb;
    document.getElementById('confirmModal').classList.add('active');
}

function closeConfirm() {
    document.getElementById('confirmModal').classList.remove('active');
    pendingConfirm = null;
}

function confirmAction() {
    if (pendingConfirm) pendingConfirm();
    closeConfirm();
}

function previewImg(input) {
    const img = input.nextElementSibling;
    if (input.value) { img.src = input.value; img.style.display = 'block'; }
    else { img.style.display = 'none'; }
}
</script>
